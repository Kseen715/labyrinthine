# =============================================================================
# ansible.cfg — project-level Ansible configuration
# This file is automatically picked up when running ansible/ansible-playbook
# from the debian-upgrade/ directory.
# =============================================================================

[defaults]

# -----------------------------------------------------------------------------
# Inventory
# -----------------------------------------------------------------------------
inventory = inventory/secret_hosts.yml

# -----------------------------------------------------------------------------
# Collections path
# Not set here — when Ansible runs inside a venv, it automatically searches
# <venv>/lib/pythonX.Y/site-packages/ansible_collections which is where
# `ansible-galaxy collection install` places collections when run from the venv.
#
# Uncomment and adjust ONLY if you install collections outside the venv, e.g.:
#   ansible-galaxy collection install -r requirements.yml -p ./collections
# collections_path = ./collections:~/.ansible/collections:/usr/share/ansible/collections
# -----------------------------------------------------------------------------


# -----------------------------------------------------------------------------
# Roles path
# -----------------------------------------------------------------------------
roles_path = ~/.ansible/roles:./roles:/usr/share/ansible/roles:/etc/ansible/roles

# -----------------------------------------------------------------------------
# Output / logging
# -----------------------------------------------------------------------------

# Make stdout output easier to read (YAML formatting via built-in default callback)
stdout_callback = ansible.builtin.default
callback_result_format = yaml

# Show timing info per task at the end of each run
callbacks_enabled = profile_tasks

# Do not show cowsay
nocows = True

# Suppress deprecation warnings from external Galaxy roles (robertdebock.*)
# that still use bare ansible_* facts instead of ansible_facts['...'].
# Our own code already uses the new syntax.
deprecation_warnings = False

# Show a diff of changed files by default (same as --diff flag)
# Set to True if you always want diff output without passing --diff
diff = False

# Number of parallel forks (hosts processed simultaneously)
# Keep low for sequential major upgrades to avoid simultaneous outages
forks = 5

# Timeout for SSH connection attempts (seconds)
timeout = 30

# Disable .retry files (leftover artefacts from failed runs)
retry_files_enabled = False

# Path for fact caching (speeds up repeated runs against the same hosts)
# Uncomment to enable JSON file-based fact cache:
# fact_caching            = jsonfile
# fact_caching_connection = .ansible_fact_cache
# fact_caching_timeout    = 3600

# -----------------------------------------------------------------------------
# Privilege escalation
# -----------------------------------------------------------------------------
become          = True
become_method   = sudo
become_ask_pass = False

# -----------------------------------------------------------------------------
# Interpreter discovery
# -----------------------------------------------------------------------------
interpreter_python = auto_silent

# -----------------------------------------------------------------------------
# SSH / connection — host key checking
# -----------------------------------------------------------------------------
# Disables interactive host-key prompts (avoids ssh-askpass errors on new hosts).
# PRODUCTION ALTERNATIVE: remove this and pre-populate known_hosts instead:
#   ssh-keyscan -H <host_ip> >> ~/.ssh/known_hosts
host_key_checking = False

# =============================================================================
[ssh_connection]
# =============================================================================

# Disable strict host key checking at the SSH level as well
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=auto -o ControlPersist=60s

# Pipelining reduces the number of SSH operations per task — significant
# speedup for playbooks with many tasks. Requires "requiretty" to be disabled
# in /etc/sudoers on the target (the default on modern Debian).
pipelining = True
