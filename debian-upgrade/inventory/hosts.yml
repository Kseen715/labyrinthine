---
all:
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_rsa
    ansible_python_interpreter: /usr/bin/python3

  children:
    debian_hosts:
      vars:
        # Set to true to allow automatic reboot after dist-upgrade
        debian_upgrade_allow_reboot: true
        # Timeout in seconds to wait for the host to come back after reboot
        debian_upgrade_reboot_timeout: 600
      hosts:
        debian-server-01:
          ansible_host: 192.168.1.10
        debian-server-02:
          ansible_host: 192.168.1.11
        debian-server-03:
          ansible_host: 192.168.1.12

    # Optional: separate group for servers that require extra care (e.g. production)
    debian_hosts_production:
      vars:
        debian_upgrade_allow_reboot: false   # reboot manually in prod
        debian_upgrade_reboot_timeout: 900
      hosts:
        debian-prod-01:
          ansible_host: 10.0.0.10
        debian-prod-02:
          ansible_host: 10.0.0.11