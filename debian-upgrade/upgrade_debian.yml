---
# =============================================================================
# upgrade_debian.yml — Upgrade Debian to a chosen release (default: 13 Trixie)
#
# The target version is fully configurable via `debian_upgrade_target_version`.
# The codename is resolved automatically from the codename map.
#
# Usage:
#   # Install Galaxy dependencies first:
#   ansible-galaxy role install -r requirements.yml
#
#   # Upgrade to Debian 13 (default):
#   ansible-playbook -i inventory/hosts.yml upgrade_debian.yml
#
#   # Upgrade to Debian 12 instead:
#   ansible-playbook -i inventory/hosts.yml upgrade_debian.yml -e debian_upgrade_target_version=12
#
#   # Dry-run (check mode, no changes applied):
#   ansible-playbook -i inventory/hosts.yml upgrade_debian.yml --check --diff
#
#   # Limit to a single host:
#   ansible-playbook -i inventory/hosts.yml upgrade_debian.yml --limit debian-server-01
#
#   # Run only pre-flight checks:
#   ansible-playbook -i inventory/hosts.yml upgrade_debian.yml --tags preflight
#
#   # Skip reboot (useful for staging):
#   ansible-playbook -i inventory/hosts.yml upgrade_debian.yml -e debian_upgrade_allow_reboot=false
#
#   # Override target mirror:
#   ansible-playbook -i inventory/hosts.yml upgrade_debian.yml -e debian_upgrade_apt_mirror=ftp.ru.debian.org
#
#   # Skip-release upgrade (UNSUPPORTED by Debian, use at your own risk):
#   ansible-playbook -i inventory/hosts.yml upgrade_debian.yml \
#     -e debian_upgrade_target_version=13 -e debian_upgrade_allow_skip_release=true
# =============================================================================

- name: "Upgrade Debian to release {{ debian_upgrade_target_version | default('13') }}"
  hosts: debian_hosts
  become: true
  become_method: sudo
  gather_facts: true
  serial: 1             # upgrade one host at a time to avoid mass outages
  any_errors_fatal: false

  vars:
    # -------------------------------------------------------------------------
    # Target release
    # -------------------------------------------------------------------------
    # Set this to the Debian major version you want to upgrade TO.
    # The codename is derived automatically from the map below.
    #
    # Override on the command line:
    #   -e debian_upgrade_target_version=12
    #   -e debian_upgrade_target_version=13
    debian_upgrade_target_version: "13"

    # Codename lookup table — version number → release codename.
    # Extend this map when new Debian releases are announced.
    debian_upgrade_codenames:
      "8": "jessie"
      "9": "stretch"
      "10": "buster"
      "11": "bullseye"
      "12": "bookworm"
      "13": "trixie"
      "14": "forky"

    # Auto-derived codename.  You should NOT need to override this.
    debian_upgrade_target_codename: "{{ debian_upgrade_codenames[debian_upgrade_target_version | string] | default('') }}"

    # -------------------------------------------------------------------------
    # Upgrade path safety
    # -------------------------------------------------------------------------
    # Debian officially supports only N → N+1 upgrades.
    # Set to true to allow skipping releases (e.g. 11 → 13).
    # This is UNSUPPORTED and may break your system.
    debian_upgrade_allow_skip_release: false

    # -------------------------------------------------------------------------
    # APT mirrors
    # -------------------------------------------------------------------------
    # Override with a closer mirror for faster downloads, e.g.:
    #   ftp.de.debian.org / ftp.ru.debian.org / mirror.yandex.ru/debian
    debian_upgrade_apt_mirror: "deb.debian.org"
    debian_upgrade_apt_security_mirror: "security.debian.org"

    # APT components to include in the generated sources.list
    debian_upgrade_apt_components: "main contrib non-free non-free-firmware"

    # -------------------------------------------------------------------------
    # Reboot
    # -------------------------------------------------------------------------
    # Set to false in production to reboot manually at a maintenance window
    debian_upgrade_allow_reboot: true
    debian_upgrade_reboot_timeout: 600
    debian_upgrade_reboot_delay: 5

    # -------------------------------------------------------------------------
    # Pre-upgrade
    # -------------------------------------------------------------------------
    # Fully update the running system before switching sources
    debian_upgrade_pre_update: true

    # -------------------------------------------------------------------------
    # Backup
    # -------------------------------------------------------------------------
    debian_upgrade_backup_sources: true
    debian_upgrade_backup_path: "/etc/apt/sources.list.bak"

    # -------------------------------------------------------------------------
    # Disk space
    # -------------------------------------------------------------------------
    debian_upgrade_check_disk_space: true
    debian_upgrade_min_free_disk_mb: 4096

    # -------------------------------------------------------------------------
    # Upgrade behaviour
    # -------------------------------------------------------------------------
    # Run dist-upgrade (as opposed to just safe-upgrade)
    debian_upgrade_dist_upgrade: true

    # Clean up obsolete packages after dist-upgrade
    debian_upgrade_autoremove: true
    debian_upgrade_autoclean: true

    # -------------------------------------------------------------------------
    # Verification
    # -------------------------------------------------------------------------
    # Verify Debian version and apt health after reboot
    debian_upgrade_verify_after_upgrade: true

    # Do not fail the play if the host is already on the target version —
    # just skip it cleanly (set to true to make it an explicit error)
    debian_upgrade_fail_if_already_upgraded: false

    # -------------------------------------------------------------------------
    # Package holds & extras
    # -------------------------------------------------------------------------
    debian_upgrade_held_packages: []
    debian_upgrade_extra_packages_pre: []
    debian_upgrade_extra_packages_post: []

    # -------------------------------------------------------------------------
    # APT reliability
    # -------------------------------------------------------------------------
    debian_upgrade_apt_timeout: 3600
    debian_upgrade_apt_retries: 3
    debian_upgrade_apt_retry_delay: 30

  pre_tasks:
    - name: Assert minimum Ansible version
      ansible.builtin.assert:
        that:
          - ansible_version.full is version('2.14', '>=')
        fail_msg: >-
          This playbook requires Ansible >= 2.14.
          Detected version: {{ ansible_version.full }}.
          Please upgrade: pip install --upgrade ansible
        success_msg: "Ansible version check passed: {{ ansible_version.full }}"
      delegate_to: localhost
      run_once: true
      tags:
        - always

    - name: Print host info before upgrade
      ansible.builtin.debug:
        msg:
          - "Host          : {{ inventory_hostname }} ({{ ansible_host | default(inventory_hostname) }})"
          - "Current OS    : {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }} ({{ ansible_facts['distribution_release'] }})"
          - "Target OS     : Debian {{ debian_upgrade_target_version }} ({{ debian_upgrade_target_codename }})"
          - "Skip-release  : {{ debian_upgrade_allow_skip_release }}"
          - "Ansible user  : {{ ansible_facts['user_id'] | default('root') }}"
      tags:
        - always

    - name: Confirm upgrade interactively (skipped in non-interactive / CI runs)
      ansible.builtin.pause:
        prompt: >-
          You are about to upgrade {{ inventory_hostname }} from
          Debian {{ ansible_facts['distribution_major_version'] }} ({{ ansible_facts['distribution_release'] }})
          to Debian {{ debian_upgrade_target_version }} ({{ debian_upgrade_target_codename }}).
          This is a MAJOR version upgrade. Press ENTER to continue or Ctrl+C → A to abort.
      when:
        - not (ansible_check_mode | bool)
        - lookup('env', 'CI') == ''
        - lookup('env', 'ANSIBLE_NOCONFIRM') == ''
      tags:
        - always

  roles:
    - role: debian_upgrade
      tags:
        - debian_upgrade

  post_tasks:
    - name: Post-play | Record upgrade timestamp on remote host
      ansible.builtin.copy:
        content: |
          Upgraded by Ansible on {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}
          From : Debian {{ ansible_facts['distribution_major_version'] }} ({{ ansible_facts['distribution_release'] }})
          To   : Debian {{ debian_upgrade_target_version }} ({{ debian_upgrade_target_codename }})
          Host : {{ inventory_hostname }}
        dest: /etc/ansible-debian-upgrade.log
        owner: root
        group: root
        mode: "0644"
      tags:
        - always

    - name: Post-play | Confirm upgrade is done
      ansible.builtin.debug:
        msg: >-
          All done! {{ inventory_hostname }} has been successfully upgraded to
          Debian {{ debian_upgrade_target_version }} ({{ debian_upgrade_target_codename }}).
      tags:
        - always