---
- name: Create Consul Server directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /opt/consul
    - /var/lib/remnawave/consul/server/data

- name: Deploy Consul Server docker-compose.yml
  ansible.builtin.template:
    src: consul-server-compose.yml.j2
    dest: /opt/consul/docker-compose.yml
    owner: root
    group: root
    mode: "0644"

- name: Start Consul Server
  community.docker.docker_compose_v2:
    project_src: /opt/consul
    state: present
    pull: always
  when: docker_services_enabled | bool

- name: Wait for Consul to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 8500
    delay: 5
    timeout: 120
    state: started
  when: docker_services_enabled | bool

- name: Show Consul container logs on failure
  ansible.builtin.command: docker logs consul-server --tail 30
  changed_when: false
  failed_when: false
  when: docker_services_enabled | bool
  register: _consul_logs

- name: Print Consul container logs
  ansible.builtin.debug:
    var: _consul_logs.stdout_lines
  when: docker_services_enabled | bool
