---
- name: restart ssh
  ansible.builtin.systemd:
    name: ssh
    state: restarted

- name: restart docker
  ansible.builtin.systemd:
    name: docker
    state: restarted
  when: docker_services_enabled | bool

- name: reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: reload ufw
  community.general.ufw:
    state: reloaded

- name: restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: restart journald
  ansible.builtin.systemd:
    name: systemd-journald
    state: restarted
