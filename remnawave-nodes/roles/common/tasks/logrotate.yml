---
- name: Install logrotate
  ansible.builtin.apt:
    name: logrotate
    state: present

- name: Create log directory for remnanode
  ansible.builtin.file:
    path: /var/log/remnanode
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy logrotate config
  ansible.builtin.template:
    src: logrotate-custom.j2
    dest: /etc/logrotate.d/remnawave
    owner: root
    group: root
    mode: "0644"

- name: Limit journald size
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "^#?{{ item.key }}="
    line: "{{ item.key }}={{ item.value }}"
    state: present
  loop:
    - { key: 'SystemMaxUse',      value: '500M' }
    - { key: 'SystemMaxFileSize', value: '100M' }
    - { key: 'MaxRetentionSec',   value: '1month' }
    - { key: 'ForwardToSyslog',   value: 'no' }
  notify: restart journald
