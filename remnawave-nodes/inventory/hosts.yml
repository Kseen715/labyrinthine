---
# =============================================================================
# inventory/hosts.yml
#
# Fill in real IPs and SECRET_KEYs before running playbooks.
# SECRET_KEY for each node is obtained from the RemnaWave panel UI after
# adding the node there (Nodes → Add Node → copy the key shown).
# =============================================================================

all:
  children:

    # ── Proxy nodes ──────────────────────────────────────────────────────────
    nodes:
      hosts:
        # node1:
        #   ansible_host: 1.2.3.4          # replace with real IP
        #   ansible_user: root
        #   SECRET_KEY: "GET_FROM_PANEL"   # replace after adding node in panel
        #   remna_node_domain: "node1.example.com"   # replace with real domain (for Caddy SNI camouflage)

        # egg:
        #   ansible_host: egg.atlas.gripe
        #   ansible_user: root
        #   SECRET_KEY: ""
          
        tofu:
    # ── Central monitoring server (Consul + Prometheus + Grafana) ─────────
    monitoring:
      hosts:
        # monitoring1:
        #   ansible_host: 9.10.11.12       # replace with real IP
        #   ansible_user: root
        tofu:
          ansible_host: tofu.atlas.gripe       # replace with real IP
          ansible_user: root
          caddy_enabled: false
          SECRET_KEY: ""